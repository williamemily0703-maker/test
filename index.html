<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Mục Tiêu & Kỷ Luật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        danger: '#ef4444',
                        success: '#10b981',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar & Animations */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .task-card { transition: all 0.2s ease-in-out; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* Ring animation for bell */
        @keyframes ring {
            0% { transform: rotate(0); }
            10% { transform: rotate(15deg); }
            20% { transform: rotate(-10deg); }
            30% { transform: rotate(5deg); }
            40% { transform: rotate(-5deg); }
            50% { transform: rotate(0); }
            100% { transform: rotate(0); }
        }
        .ring-animation { animation: ring 2s infinite; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 font-sans min-h-screen transition-colors duration-300">

    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-10 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-primary flex items-center gap-2">
                <i class="fas fa-bullseye"></i> GoalTracker Pro
            </h1>
            <div class="flex items-center gap-3 md:gap-4">
                <button onclick="exportData()" class="p-2 text-gray-500 hover:text-primary dark:text-gray-400 dark:hover:text-primary transition" title="Tải dữ liệu xuống">
                    <i class="fas fa-download"></i>
                </button>
                <label class="p-2 text-gray-500 hover:text-primary dark:text-gray-400 dark:hover:text-primary cursor-pointer transition" title="Nhập dữ liệu">
                    <i class="fas fa-upload"></i>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                </label>
                <button onclick="toggleDarkMode()" class="p-2 text-gray-500 hover:text-warning dark:text-gray-400 dark:hover:text-warning transition text-lg" title="Chuyển chế độ giao diện">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <aside class="lg:col-span-1 space-y-6">
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-5 transition-colors duration-300">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold border-b-2 border-primary pb-1">Mục Tiêu</h2>
                    <button onclick="openGoalModal()" class="text-sm bg-primary/10 text-primary hover:bg-primary hover:text-white rounded-full w-8 h-8 flex items-center justify-center transition">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <ul id="goalsList" class="space-y-2">
                    </ul>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-5 transition-colors duration-300">
                <h2 class="text-lg font-semibold border-b-2 border-success pb-1 mb-4">Thống Kê</h2>
                <div id="statsContainer" class="space-y-4">
                    </div>
            </div>
        </aside>

        <section class="lg:col-span-3 space-y-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white dark:bg-gray-800 rounded-xl shadow-sm p-5 transition-colors duration-300">
                <div>
                    <h2 id="currentGoalTitle" class="text-xl font-bold">Tất cả công việc</h2>
                    <p id="currentGoalProgress" class="text-sm text-gray-500 dark:text-gray-400 mt-1"></p>
                </div>
                <button onclick="openTaskModal()" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-lg shadow transition flex items-center gap-2 w-full sm:w-auto justify-center">
                    <i class="fas fa-plus"></i> Thêm Công Việc
                </button>
            </div>

            <div id="tasksList" class="space-y-4">
                </div>
        </section>

    </main>

    <div id="goalModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md p-6 transform transition-all">
            <h3 id="goalModalTitle" class="text-xl font-bold mb-4">Thêm Mục Tiêu</h3>
            <input type="hidden" id="goalId">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Tên mục tiêu <span class="text-danger">*</span></label>
                    <input type="text" id="goalName" class="w-full border dark:border-gray-600 dark:bg-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Ví dụ: Học Tiếng Anh">
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button onclick="closeModal('goalModal')" class="px-4 py-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition">Hủy</button>
                    <button onclick="saveGoal()" class="px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg shadow transition">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <div id="taskModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 overflow-y-auto transition-opacity duration-300">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-lg p-6 my-8 transform transition-all">
            <h3 id="taskModalTitle" class="text-xl font-bold mb-4">Thêm Công Việc</h3>
            <input type="hidden" id="taskId">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Thuộc Mục Tiêu <span class="text-danger">*</span></label>
                    <select id="taskGoalId" class="w-full border dark:border-gray-600 dark:bg-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Tên công việc <span class="text-danger">*</span></label>
                    <input type="text" id="taskName" class="w-full border dark:border-gray-600 dark:bg-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Ví dụ: Luyện nghe 30 phút">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Bắt đầu <span class="text-danger">*</span></label>
                        <input type="datetime-local" id="taskStart" class="w-full border dark:border-gray-600 dark:bg-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Kết thúc <span class="text-danger">*</span></label>
                        <input type="datetime-local" id="taskEnd" class="w-full border dark:border-gray-600 dark:bg-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Mức độ ưu tiên</label>
                        <select id="taskPriority" class="w-full border dark:border-gray-600 dark:bg-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="low">Thấp</option>
                            <option value="medium" selected>Trung bình</option>
                            <option value="high">Cao</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-danger font-bold">Hình phạt (Penalty)</label>
                        <input type="text" id="taskPenalty" class="w-full border dark:border-gray-600 dark:bg-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-danger" placeholder="Vd: Chạy 5km / Không cafe">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Ghi chú</label>
                    <textarea id="taskNotes" rows="2" class="w-full border dark:border-gray-600 dark:bg-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button onclick="closeModal('taskModal')" class="px-4 py-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition">Hủy</button>
                    <button onclick="saveTask()" class="px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg shadow transition">Lưu Công Việc</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notificationToast" class="fixed bottom-4 right-4 bg-white dark:bg-gray-800 border-l-4 border-primary shadow-2xl p-4 rounded-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 max-w-sm w-full flex gap-3">
        <div class="text-primary text-2xl"><i class="fas fa-bell ring-animation"></i></div>
        <div class="flex-1">
            <h4 class="font-bold text-lg" id="toastTitle">Đến giờ!</h4>
            <p class="text-sm text-gray-600 dark:text-gray-300" id="toastDesc"></p>
        </div>
        <button onclick="hideToast()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
    </div>

    <script>
        // --- 1. QUẢN LÝ TRẠNG THÁI (STATE) ---
        let state = {
            goals: [],
            tasks: [],
            settings: { darkMode: false },
            activeGoalId: 'all'
        };

        // --- 2. HỆ THỐNG LƯU TRỮ (LOCAL STORAGE) ---
        const STORAGE_KEY = 'GoalTrackerData';

        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    state.goals = parsed.goals || [];
                    state.tasks = parsed.tasks || [];
                    state.settings = parsed.settings || { darkMode: false };
                } catch (e) {
                    console.error("Lỗi đọc dữ liệu:", e);
                }
            }
            applyTheme();
            requestNotificationPermission();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            renderApp();
        }

        // Xuất / Nhập File
        function exportData() {
            const dataStr = JSON.stringify(state, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `GoalTracker_Backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.goals && imported.tasks) {
                        state = imported;
                        saveData();
                        alert("Nhập dữ liệu thành công!");
                    } else {
                        alert("File không đúng định dạng!");
                    }
                } catch (err) {
                    alert("Lỗi đọc file!");
                }
            };
            reader.readAsText(file);
        }

        // --- 3. TIỆN ÍCH (UTILITIES) ---
        const generateId = () => '_' + Math.random().toString(36).substr(2, 9);
        
        function toggleDarkMode() {
            state.settings.darkMode = !state.settings.darkMode;
            applyTheme();
            saveData();
        }

        function applyTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (state.settings.darkMode) {
                html.classList.add('dark');
                icon.className = 'fas fa-sun';
            } else {
                html.classList.remove('dark');
                icon.className = 'fas fa-moon';
            }
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' };
            return new Date(dateString).toLocaleDateString('vi-VN', options);
        }

        function calculateTimeLeft(targetDate) {
            const diff = new Date(targetDate) - new Date();
            if (diff <= 0) return null;
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);
            return `${h}h ${m}m ${s}s`;
        }

        // --- 4. RENDER GIAO DIỆN ---
        function renderApp() {
            renderGoalsList();
            renderTasksList();
            renderStats();
            updateGoalSelectInModal();
        }

        function renderGoalsList() {
            const list = document.getElementById('goalsList');
            let html = `
                <li class="cursor-pointer p-2 rounded-lg transition ${state.activeGoalId === 'all' ? 'bg-primary/10 text-primary font-bold' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}" 
                    onclick="setActiveGoal('all')">
                    <i class="fas fa-list-ul w-5"></i> Tất cả
                </li>
            `;
            
            state.goals.forEach(goal => {
                const isActive = state.activeGoalId === goal.id;
                html += `
                    <li class="group flex justify-between items-center p-2 rounded-lg transition ${isActive ? 'bg-primary/10 text-primary font-bold' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}">
                        <div class="cursor-pointer flex-1 truncate" onclick="setActiveGoal('${goal.id}')">
                            <i class="fas fa-folder w-5 text-gray-400 ${isActive ? 'text-primary' : ''}"></i> ${goal.name}
                        </div>
                        <div class="opacity-0 group-hover:opacity-100 transition flex gap-2">
                            <button onclick="editGoal('${goal.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteGoal('${goal.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                        </div>
                    </li>
                `;
            });
            list.innerHTML = html;
        }

        function renderStats() {
            const container = document.getElementById('statsContainer');
            const total = state.tasks.length;
            const completed = state.tasks.filter(t => t.completed).length;
            const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

            container.innerHTML = `
                <div class="flex justify-between text-sm mb-1">
                    <span>Tiến độ tổng:</span>
                    <span class="font-bold">${percent}%</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5 mb-4">
                    <div class="bg-success h-2.5 rounded-full transition-all duration-500" style="width: ${percent}%"></div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="bg-gray-50 dark:bg-gray-700 p-2 rounded-lg">
                        <div class="text-2xl font-bold text-success">${completed}</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400">Đã xong</div>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-700 p-2 rounded-lg">
                        <div class="text-2xl font-bold text-warning">${total - completed}</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400">Đang chờ</div>
                    </div>
                </div>
            `;
        }

        function renderTasksList() {
            const list = document.getElementById('tasksList');
            const title = document.getElementById('currentGoalTitle');
            const progress = document.getElementById('currentGoalProgress');

            let filteredTasks = state.tasks;
            if (state.activeGoalId !== 'all') {
                filteredTasks = state.tasks.filter(t => t.goalId === state.activeGoalId);
                const goal = state.goals.find(g => g.id === state.activeGoalId);
                title.textContent = goal ? goal.name : "Mục tiêu không tồn tại";
            } else {
                title.textContent = "Tất cả công việc";
            }

            filteredTasks.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));

            const comp = filteredTasks.filter(t => t.completed).length;
            progress.textContent = `${comp}/${filteredTasks.length} công việc hoàn thành`;

            if (filteredTasks.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-500"><i class="fas fa-clipboard-list text-4xl mb-3 opacity-50"></i><p>Chưa có công việc nào.</p></div>`;
                return;
            }

            let html = '';
            const now = new Date();

            filteredTasks.forEach(task => {
                const start = new Date(task.startTime);
                const end = new Date(task.endTime);
                
                let statusClass = 'border-l-4 border-gray-300 dark:border-gray-600';
                let statusIcon = '<i class="far fa-circle text-gray-400 hover:text-success transition text-xl"></i>';
                let overdueWarning = '';
                let timerHtml = '';

                if (task.completed) {
                    statusClass = 'border-l-4 border-success opacity-75';
                    statusIcon = '<i class="fas fa-check-circle text-success text-xl"></i>';
                } else if (now > end) {
                    statusClass = 'border-l-4 border-danger bg-red-50 dark:bg-red-900/20';
                    overdueWarning = `
                        <div class="mt-3 p-2 bg-red-100 dark:bg-red-900/50 text-danger rounded-md text-sm flex items-start gap-2 border border-red-200 dark:border-red-800">
                            <i class="fas fa-exclamation-triangle mt-1"></i>
                            <div>
                                <strong>Quá hạn! Hình phạt:</strong><br>
                                ${task.penalty || 'Không có hình phạt. Nhưng hãy tự giác nhé!'}
                            </div>
                        </div>
                    `;
                } else if (now < start) {
                    timerHtml = `<span class="countdown text-xs font-mono bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200 px-2 py-1 rounded" data-start="${task.startTime}">Đang tính...</span>`;
                } else {
                    statusClass = 'border-l-4 border-warning';
                    timerHtml = `<span class="text-xs font-medium bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200 px-2 py-1 rounded"><i class="fas fa-spinner fa-spin mr-1"></i>Đang diễn ra</span>`;
                }

                const prioColors = {
                    high: 'text-red-600 bg-red-100 dark:bg-red-900/50 dark:text-red-400',
                    medium: 'text-blue-600 bg-blue-100 dark:bg-blue-900/50 dark:text-blue-400',
                    low: 'text-gray-600 bg-gray-100 dark:bg-gray-700 dark:text-gray-400'
                };
                const prioLabels = { high: 'Cao', medium: 'Vừa', low: 'Thấp' };
                const goalName = state.goals.find(g => g.id === task.goalId)?.name || 'Không rõ';

                html += `
                    <div class="task-card bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm ${statusClass}">
                        <div class="flex items-start gap-3">
                            <button onclick="toggleTaskStatus('${task.id}')" class="mt-1 focus:outline-none" title="Đánh dấu hoàn thành">
                                ${statusIcon}
                            </button>
                            <div class="flex-1 min-w-0">
                                <div class="flex flex-wrap items-center justify-between gap-2 mb-1">
                                    <h3 class="font-bold text-lg ${task.completed ? 'line-through text-gray-500' : ''}">${task.name}</h3>
                                    <div class="flex items-center gap-2">
                                        ${timerHtml}
                                        <span class="text-xs px-2 py-1 rounded-full ${prioColors[task.priority]}">${prioLabels[task.priority]}</span>
                                        <div class="flex gap-2 ml-2">
                                            <button onclick="editTask('${task.id}')" class="text-gray-400 hover:text-blue-500"><i class="fas fa-edit"></i></button>
                                            <button onclick="deleteTask('${task.id}')" class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                </div>
                                <div class="text-sm text-gray-600 dark:text-gray-400 flex flex-wrap gap-x-4 gap-y-1 mb-2">
                                    <span title="Mục tiêu"><i class="fas fa-folder-open w-4"></i> ${goalName}</span>
                                    <span><i class="far fa-clock w-4"></i> ${formatDate(task.startTime)} - ${formatDate(task.endTime)}</span>
                                </div>
                                ${task.notes ? `<p class="text-sm text-gray-500 italic mt-2 border-l-2 border-gray-200 dark:border-gray-600 pl-2">${task.notes}</p>` : ''}
                                ${overdueWarning}
                            </div>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        // --- 5. LOGIC QUẢN LÝ DỮ LIỆU ---
        function setActiveGoal(id) {
            state.activeGoalId = id;
            renderTasksList();
            renderGoalsList(); 
        }

        function toggleTaskStatus(id) {
            const task = state.tasks.find(t => t.id === id);
            if(task) {
                task.completed = !task.completed;
                saveData();
            }
        }

        // LOGIC MỤC TIÊU - SỬ DỤNG REMOVE VÀ ADD CLASS CHO AN TOÀN TRÊN IOS
        function openGoalModal() {
            document.getElementById('goalId').value = '';
            document.getElementById('goalName').value = '';
            document.getElementById('goalModalTitle').innerText = 'Thêm Mục Tiêu';
            
            const modal = document.getElementById('goalModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function editGoal(id) {
            const goal = state.goals.find(g => g.id === id);
            if(goal) {
                document.getElementById('goalId').value = goal.id;
                document.getElementById('goalName').value = goal.name;
                document.getElementById('goalModalTitle').innerText = 'Sửa Mục Tiêu';
                
                const modal = document.getElementById('goalModal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }
        }

        function saveGoal() {
            const id = document.getElementById('goalId').value;
            const name = document.getElementById('goalName').value.trim();
            if(!name) return alert("Vui lòng nhập tên mục tiêu!");

            if(id) {
                const goal = state.goals.find(g => g.id === id);
                if(goal) goal.name = name;
            } else {
                state.goals.push({ id: generateId(), name });
            }
            closeModal('goalModal');
            saveData();
        }

        function deleteGoal(id) {
            if(confirm("Bạn có chắc muốn xóa mục tiêu này? Tất cả task bên trong sẽ bị xóa theo.")) {
                state.goals = state.goals.filter(g => g.id !== id);
                state.tasks = state.tasks.filter(t => t.goalId !== id);
                if(state.activeGoalId === id) state.activeGoalId = 'all';
                saveData();
            }
        }

        // LOGIC CÔNG VIỆC
        function updateGoalSelectInModal() {
            const select = document.getElementById('taskGoalId');
            select.innerHTML = state.goals.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        }

        function taskFormResetHandler() {
            document.getElementById('taskName').value = '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskPenalty').value = '';
            document.getElementById('taskNotes').value = '';
        }

        function openTaskModal() {
            if(state.goals.length === 0) return alert("Vui lòng tạo ít nhất 1 Mục tiêu trước!");
            document.getElementById('taskId').value = '';
            taskFormResetHandler(); 
            
            const now = new Date();
            const later = new Date(now.getTime() + 60*60*1000);
            const toLocalISO = (d) => new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
            
            document.getElementById('taskStart').value = toLocalISO(now);
            document.getElementById('taskEnd').value = toLocalISO(later);
            
            if(state.activeGoalId !== 'all') {
                document.getElementById('taskGoalId').value = state.activeGoalId;
            }

            document.getElementById('taskModalTitle').innerText = 'Thêm Công Việc';
            
            const modal = document.getElementById('taskModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function editTask(id) {
            const task = state.tasks.find(t => t.id === id);
            if(task) {
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskGoalId').value = task.goalId;
                document.getElementById('taskName').value = task.name;
                document.getElementById('taskStart').value = task.startTime;
                document.getElementById('taskEnd').value = task.endTime;
                document.getElementById('taskPriority').value = task.priority;
                document.getElementById('taskPenalty').value = task.penalty || '';
                document.getElementById('taskNotes').value = task.notes || '';
                
                document.getElementById('taskModalTitle').innerText = 'Sửa Công Việc';
                
                const modal = document.getElementById('taskModal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }
        }

        function saveTask() {
            const id = document.getElementById('taskId').value;
            const taskData = {
                goalId: document.getElementById('taskGoalId').value,
                name: document.getElementById('taskName').value.trim(),
                startTime: document.getElementById('taskStart').value,
                endTime: document.getElementById('taskEnd').value,
                priority: document.getElementById('taskPriority').value,
                penalty: document.getElementById('taskPenalty').value.trim(),
                notes: document.getElementById('taskNotes').value.trim()
            };

            if(!taskData.name || !taskData.startTime || !taskData.endTime) {
                return alert("Vui lòng điền đủ tên và thời gian!");
            }
            if(new Date(taskData.startTime) >= new Date(taskData.endTime)) {
                return alert("Thời gian kết thúc phải sau thời gian bắt đầu!");
            }

            if(id) {
                const taskIndex = state.tasks.findIndex(t => t.id === id);
                taskData.completed = state.tasks[taskIndex].completed;
                taskData.notified = new Date(taskData.startTime) > new Date() ? false : state.tasks[taskIndex].notified;
                
                state.tasks[taskIndex] = { id, ...taskData };
            } else {
                state.tasks.push({ 
                    id: generateId(), 
                    ...taskData, 
                    completed: false,
                    notified: false 
                });
            }
            closeModal('taskModal');
            saveData();
        }

        function deleteTask(id) {
            if(confirm("Bạn có chắc muốn xóa công việc này?")) {
                state.tasks = state.tasks.filter(t => t.id !== id);
                saveData();
            }
        }

        // TẮT MODAL CŨNG DÙNG CÁCH AN TOÀN CHO IOS
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        // --- 6. HỆ THỐNG THÔNG BÁO VÀ THỜI GIAN THỰC ---
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playAlarmSound() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5); 
            
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1); 
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1);
        }

        function showToast(title, body) {
            const toast = document.getElementById('notificationToast');
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastDesc').innerText = body;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(hideToast, 8000); 
        }

        function hideToast() {
            const toast = document.getElementById('notificationToast');
            toast.classList.add('translate-y-20', 'opacity-0');
            toast.classList.remove('translate-y-0', 'opacity-100');
        }

        function triggerAlarm(task) {
            playAlarmSound();
            showToast("Bắt đầu: " + task.name, "Đã đến giờ làm việc. Cố lên!");
            
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("GoalTracker: Bắt đầu công việc!", {
                    body: task.name,
                    icon: "https://cdn-icons-png.flaticon.com/512/4333/4333609.png"
                });
            }
        }

        function tickLoop() {
            const now = new Date();
            let needReRender = false;

            const countdownElements = document.querySelectorAll('.countdown');
            countdownElements.forEach(el => {
                const target = el.getAttribute('data-start');
                const timeLeft = calculateTimeLeft(target);
                if (timeLeft) {
                    el.innerText = `Còn ${timeLeft}`;
                } else {
                    needReRender = true; 
                }
            });

            state.tasks.forEach(task => {
                if (task.completed) return;

                const start = new Date(task.startTime);
                const end = new Date(task.endTime);

                if (now >= start && !task.notified) {
                    triggerAlarm(task);
                    task.notified = true;
                    saveData(); 
                    needReRender = false; 
                }
                
                if (now.getSeconds() === 0 && now > end) {
                    needReRender = true;
                }
            });

            if (needReRender) {
                renderTasksList();
            }
        }

        // --- 7. KHỞI CHẠY (INITIALIZATION) ---
        window.onload = () => {
            loadData();
            setInterval(tickLoop, 1000);
            
            document.body.addEventListener('click', function unlockAudio() {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                document.body.removeEventListener('click', unlockAudio);
            }, { once: true });
        };
    </script>
</body>
